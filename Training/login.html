<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>
    <style>
        body{
            font-family: Arial;
            background: #f2f2f2;
        }
        .login{
            width: 300px;
            margin: 100px auto;
            padding: 20px;
            background: lightpink;
            text-align: center;
            border-radius: 10px;

        
        }
        input{
            width: 90%;
            padding: 10px;
            margin: 10px;
        }
        button{
            padding: 10px 20px;
            background: white; 
            color: blue;
            border: none;
        }

    </style>
</head>

<body>

    <center>
        <div class="login">
        <h1>Login Page</h1>

        <form>

            <label>Username:</label><br>
            <input type="text" placeholder="Enter username"><br><br>

            <label>Password:</label><br>
            <input type="password" placeholder="Enter password"><br><br>

            <input type="submit" value="Login">

        </form>

        <br>
<article>
        <p>Don't have an account?</p>
        <a href="#">Register here</a>
</article>
</div>
    </center>

</body>
</html>
